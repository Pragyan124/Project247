apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namePrefix: prod-

images:
  - name: pragyanborthakur/devops-server
    newTag: stable
  - name: pragyanborthakur/devops-client
    newTag: stable

# This "patch" increases replicas for production only
patches:
  - target:
      kind: Deployment
      name: todo-backend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
