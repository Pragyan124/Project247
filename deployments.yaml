# 1. THE FRONTEND
apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: pragyanborthakur/devops-client:latest # Replace with your DockerHub image
        ports:
        - containerPort: 3000
---
# 2. THE BACKEND
apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: pragyanborthakur/devops-server:latest # Replace with your DockerHub image
        ports:
        - containerPort: 5000
